apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-a-sa
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: view-pods
  namespace: default
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["pods"]
  verbs: ["get", "list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-a-sa-view-pods
  namespace: default
subjects:
  - kind: ServiceAccount
    name: service-a-sa
    namespace: default
roleRef:
  kind: Role
  name: view-pods
  apiGroup: rbac.authorization.k8s.io