apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: greetings.lab.timm.preetz.xyz
spec:
  group: lab.timm.preetz.xyz
  scope: Namespaced
  names:
    plural: greetings
    singular: greeting
    kind: Greeting
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        required:
        - spec
        properties:
          spec:
            type: object
            required:
            - message
            properties:
              message:
                type: string

---

apiVersion: lab.timm.preetz.xyz/v1
kind: Greeting
metadata:
  name: greeting
spec:
  message: Hello Timm!