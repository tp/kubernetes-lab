apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  labels:
    app: service-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: service-b
        image: hashicorp/http-echo
        env:
        - name: GREETING_TEXT
          valueFrom:
            configMapKeyRef:
              name: service-b-config
              key: GREETING_TEXT
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: service-b-secret
              key: API_TOKEN
        args: 
          - "-text=$(GREETING_TEXT)"
          - "-listen=:8080"
        ports:
          - containerPort: 8080
            name: http
        readinessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 10 # 
        resources:
          limits:
            memory: "64Mi"
          requests:
            cpu: "50m"
            memory: "32Mi"