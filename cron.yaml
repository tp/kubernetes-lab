apiVersion: batch/v1
kind: CronJob
metadata:
  name: sleep
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: sleep
            image: busybox
            command:
            - sh
            - -c
            - sleep 3 && echo done
          restartPolicy: Never